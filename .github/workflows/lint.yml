name: Lint

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Solhint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install solhint
        run: npm install -g solhint

      - name: Run solhint
        run: solhint src/AeternumVault.sol