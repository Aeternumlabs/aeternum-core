# Echidna configuration for AeternumVault
# Docs: https://github.com/crytic/echidna/wiki/Config

# ── Fuzzing mode ────────────────────────────────────────────────────────────
testMode: "property"

# ── Test limits ─────────────────────────────────────────────────────────────
testLimit: 50000
seqLen: 100

# ── Corpus ──────────────────────────────────────────────────────────────────
corpusDir: "echidna-corpus"

# ── Coverage ────────────────────────────────────────────────────────────────
coverage: true

# ── Sender addresses ────────────────────────────────────────────────────────
sender:
  - "0x1000000000000000000000000000000000000000"
  - "0x2000000000000000000000000000000000000000"
  - "0x3000000000000000000000000000000000000000"
  - "0x4000000000000000000000000000000000000000"

# ── Shrinking ───────────────────────────────────────────────────────────────
shrinkLimit: 5000

# ── Output ──────────────────────────────────────────────────────────────────
format: "text"

cryticArgs:
  - "--solc-remaps"
  - "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
